name: recyclarr drift check

on:
  schedule:
    # Every 3 hours. GitHub cron is always UTC; there is no timezone field.
    # The drift check is light (docker list + a ~15KB schema fetch), so it runs
    # on every tick. The AI suggestion step is gated separately to ~1 call/day.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    # PR merges land here as a push, so this covers both. The bot's own
    # commit-back uses [skip ci] AND pushes made with GITHUB_TOKEN never
    # re-trigger workflows, so there is no run loop. Path filter keeps doc-only
    # edits from spending a run.
    paths:
      - "recyclarr.yml"
      - "scripts/**"
      - ".github/workflows/drift-check.yml"

# Least privilege: only what this job needs. Everything else defaults to none.
# The per-change flow opens/updates PRs and (for unpatchable schema features)
# labeled issues, and still commits the snapshot + suggestions baselines back.
permissions:
  contents: write        # commit & push schema-snapshot.json + suggestions.json,
                         #   and create the per-change PR branches
  pull-requests: write   # open / update / close the per-change PRs (manage_prs.py)
  issues: write          # open / update the feature issues for unpatchable schema props

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so manage_prs.py can create/switch/diff per-change branches
      # and compare them against main. A shallow clone would break branch work.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # cache: pip + cache-dependency-path keys the pip download cache on the hash
      # of requirements.txt -- change a dependency and it reinstalls; otherwise the
      # wheels are restored from cache and `pip install` is near-instant.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: requirements.txt

      # Dependencies are declared in requirements.txt (pyyaml, ruamel.yaml,
      # anthropic) so the cache key above can hash them.
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # --- Cache the recyclarr docker image, keyed on its LIVE digest ----------
      # We resolve the current digest of the :8 tag (a tiny manifest metadata call,
      # not the image layers). When recyclarr publishes a new :8 image the digest
      # changes -> cache miss -> we pull fresh. When unchanged -> cache hit -> we
      # `docker load` the saved tar and skip the pull entirely. This keeps us on the
      # current image while avoiding a redundant pull on most runs.
      - name: Resolve recyclarr image digest
        id: rcimg
        run: |
          set -eo pipefail
          DIGEST="$(docker buildx imagetools inspect ghcr.io/recyclarr/recyclarr:8 \
            | awk '/^Digest:/{print $2; exit}')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "recyclarr:8 digest = $DIGEST"

      - name: Cache recyclarr image
        id: rccache
        uses: actions/cache@v5
        with:
          path: /tmp/recyclarr-image.tar
          key: recyclarr-image-${{ steps.rcimg.outputs.digest }}

      - name: Load or pull recyclarr image
        run: |
          set -eo pipefail
          if [ -f /tmp/recyclarr-image.tar ]; then
            echo "cache hit -> loading image from tar"
            docker load -i /tmp/recyclarr-image.tar
          else
            echo "cache miss -> pulling current image"
            docker pull ghcr.io/recyclarr/recyclarr:8
            docker save ghcr.io/recyclarr/recyclarr:8 -o /tmp/recyclarr-image.tar
          fi

      # Capture recyclarr `list` output via docker. `list custom-formats` only
      # reads TRaSH guide data over the network -- it does NOT connect to
      # Sonarr/Radarr and does NOT require a config file, so no volume is mounted
      # (mounting a config with !env_var secrets could trigger a parse failure).
      # `--raw` emits stable TSV (trash_id<TAB>name<TAB>category); recyclarr writes
      # the list to stdout and diagnostics to stderr, so the file stays clean.
      # These files feed BOTH check_drift.py (staleness) and suggest_cfs.py
      # (candidate catalog). Image is pinned to the :8 major tag.
      - name: Dump recyclarr custom formats
        run: |
          set -eo pipefail
          IMAGE="ghcr.io/recyclarr/recyclarr:8"

          docker run --rm "$IMAGE" list custom-formats sonarr --raw > /tmp/cf_sonarr.txt
          docker run --rm "$IMAGE" list custom-formats radarr --raw > /tmp/cf_radarr.txt

      # check_drift.py reads /tmp/cf_sonarr.txt + /tmp/cf_radarr.txt and writes:
      #   - /tmp/drift_result.json   (existing shape: has_drift + stale lists + body)
      #   - /tmp/drift_changes.json  ({"changes":[...drift...], "feature_issues":[...]})
      #       one change-record per stale trash_id (each becomes a PR), plus one
      #       feature-issue record per new, unpatchable schema property.
      # It also refreshes schema-snapshot.json in the working tree (committed below).
      - name: Check for drift
        run: |
          set -eo pipefail
          python scripts/check_drift.py

      # AI suggestion step -- GATED to run roughly once per day to keep cost and
      # API usage minimal (decision O2: a single combined call covers both
      # services). It runs when the current UTC hour is 06, OR on any manual
      # workflow_dispatch / push (so an operator or a fresh commit forces a refresh).
      # On the other 3h ticks it is skipped entirely and the previously committed
      # suggestions.json is reused.
      #
      # suggest_cfs.py is responsible for the O1 cost optimization itself: it
      # skips the Anthropic call when recyclarr.yml's hash AND the guide-catalog
      # hash are both unchanged since suggestions.json was generated.
      #
      # It writes BOTH suggestions.json (committed back, for the O1 hash skip) and
      # /tmp/ai_changes.json ({"changes":[...suggestion+settings...]}), one change
      # per suggestion (each becomes a PR with a best-guess assign_profile).
      #
      # IMPORTANT: when this step is SKIPPED we still write an empty
      # /tmp/ai_changes.json so manage_prs.py below always has a file to read.
      - name: Refresh AI custom-format suggestions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -eo pipefail

          # Gate (UTC). GitHub Actions has no UTC-hour expression for a step-level
          # `if:`, so the whole gate lives here in shell. Run the suggestion step on:
          #   - workflow_dispatch (manual force-refresh)
          #   - push (e.g. you committed a new recyclarr.yml — get fresh suggestions
          #     immediately; the script's O1 hash check skips the actual API call if
          #     nothing relevant changed, so this is free when it's a no-op push)
          #   - the 06:00 scheduled tick (daily refresh)
          # Every other 3h scheduled tick exits early. In that case we MUST still
          # leave a well-formed /tmp/ai_changes.json so manage_prs.py has a file to
          # read; we write an empty change set here before exiting.
          HOUR_UTC="$(date -u +%H)"
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" != "workflow_dispatch" ] && [ "$EVENT" != "push" ] && [ "$HOUR_UTC" != "06" ]; then
            echo "Scheduled tick at UTC hour $HOUR_UTC (not 06) and not manual/push; skipping AI suggestion refresh."
            # evaluated:false tells manage_prs.py NOT to reconcile (close) the
            # suggestion/settings PRs this tick -- they weren't re-evaluated, so
            # an empty change set here must not be read as "no longer relevant".
            echo '{"changes":[],"evaluated":false}' > /tmp/ai_changes.json
            exit 0
          fi

          # suggest_cfs.py reads recyclarr.yml + /tmp/cf_*.txt, performs its own
          # unchanged-hash short-circuit (O1), and writes suggestions.json plus
          # /tmp/ai_changes.json. It NEVER outputs or applies scores.
          python scripts/suggest_cfs.py

      # Reconcile per-change PRs + feature issues. manage_prs.py reads BOTH
      # /tmp/drift_changes.json and /tmp/ai_changes.json and, for each change
      # record, creates/updates a branch (recyclarr/<type>/<key>) carrying that
      # single change applied to recyclarr.yml, opens or updates the matching PR,
      # closes PRs whose change no longer applies, and upserts the feature issues.
      # It uses the gh CLI (GH_TOKEN) for all PR/issue operations.
      #
      # We set the bot git identity BEFORE running it so any branch commits it
      # makes are attributed to github-actions[bot].
      - name: Reconcile per-change PRs and feature issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python scripts/manage_prs.py

      # Commit back any changed schema-snapshot.json AND suggestions.json in a
      # single commit so the next run's comparisons (schema diff + O1 hash skip)
      # stay correct. Both files may not exist on a given run (e.g. schema fetch
      # failed, or the AI step was skipped on first ever run), so each `git add`
      # is guarded. We only commit/push when there is an actual staged diff.
      #
      # ORDERING: manage_prs.py switches branches while building per-change PRs.
      # It is responsible for leaving the working tree back on `main` and clean
      # when it finishes. We defensively re-checkout main here so this commit-back
      # always lands on main even if manage_prs left HEAD elsewhere, then re-add
      # the baseline files from the working tree (which check_drift/suggest_cfs
      # wrote on main before any branch switching happened).
      - name: Commit updated snapshot and suggestions
        run: |
          set -eo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Defensive: ensure we commit onto main regardless of where manage_prs.py
          # left HEAD. -- main is the long-lived branch the baselines belong to.
          git checkout main

          if [ -f schema-snapshot.json ]; then
            git add schema-snapshot.json
          fi
          if [ -f suggestions.json ]; then
            git add suggestions.json
          fi

          if git diff --staged --quiet; then
            echo "No snapshot or suggestion changes."
          else
            git commit -m "chore: update recyclarr schema snapshot + suggestions [skip ci]"
            git push
          fi
